version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: aipostgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_platform
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: airedis
    ports:
      - "6379:6379"